services:
  - type: web
    name: saas-training-backend
    env: node
    region: oregon
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "node index.js"
    envVars:
      - key: MONGODB_URI
        fromSecret: MONGODB_URI
      - key: JWT_SECRET
        fromSecret: JWT_SECRET
      - key: STRIPE_SECRET_KEY
        fromSecret: STRIPE_SECRET_KEY